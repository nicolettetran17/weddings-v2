<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plan with All In Weddings</title>
  <link rel="icon" href="../rcd-design-system/assets/logos/aiw-circle-black.png" />

  <link rel="stylesheet" href="../rcd-design-system/tokens.css" />
  <link rel="stylesheet" href="./_theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-ink:            #2A2A28;
      --color-ink-soft:       #5A554D;
      --color-ink-muted:      #948D80;
      --color-paper:          #FFFFFF;
      --color-canvas:         #F5EFE6;
      --color-cream:          #E8DDD0;
      --color-cream-soft:     #F0E8DC;
      --color-copper:         #B4814D;
      --color-copper-hover:   #9A6E40;
      --color-copper-active:  #805B33;
      --color-copper-soft:    #E8D5BD;
      --color-disabled-bg:    #E5E0D8;
      --color-disabled-fg:    #B8B0A6;
      --color-border-strong:  #2A2A28;
      --color-border-default: #C9C2B6;
      --color-border-subtle:  #E5E0D8;
      --font-sans:            "Poppins","Inter",system-ui,sans-serif;
      --font-title:           "Isabella Grand","Cormorant Garamond",serif;
      --font-title-plain:     "Isabella Grand Plain","Cormorant Garamond",serif;
      --radius-pill:          9999px;
    }
    @layer components {
      .btn {
        @apply inline-flex items-center justify-center gap-2
               font-sans font-semibold leading-none whitespace-nowrap
               rounded-pill select-none cursor-pointer
               transition-colors duration-200
               focus:outline-none focus-visible:ring-[3px] focus-visible:ring-offset-2
               focus-visible:ring-offset-canvas focus-visible:ring-ink;
      }
      .btn--default { @apply h-11 px-6 text-base; }
      .btn--small   { @apply h-9  px-[18px] text-sm; }
      .btn--icon    { @apply h-11 w-11 p-0 text-base; }
      .btn--icon-sm { @apply h-9  w-9  p-0 text-sm; }
      .btn--primary {
        @apply bg-ink text-paper hover:bg-ink-soft active:bg-black;
      }
      .btn--secondary {
        @apply bg-copper text-paper hover:bg-copper-hover active:bg-copper-active;
      }
      .btn--ghost {
        @apply border border-ink bg-transparent text-ink
               hover:bg-cream active:bg-cream-soft;
      }
      .btn--invert {
        @apply bg-paper text-ink hover:bg-cream;
      }
      .btn--block {
        @apply w-full max-w-none justify-center;
      }
      .btn[disabled],
      .btn.is-disabled {
        @apply pointer-events-none;
      }
      .btn--primary[disabled], .btn--primary.is-disabled,
      .btn--secondary[disabled], .btn--secondary.is-disabled {
        @apply bg-disabled-bg text-disabled-fg;
      }
      .btn--ghost[disabled], .btn--ghost.is-disabled {
        @apply border-border-subtle bg-transparent text-disabled-fg;
      }

      .field {
        @apply flex w-full min-h-11 items-center justify-between gap-3 rounded-pill
               border border-border-default bg-paper px-4 py-2 font-sans text-ink shadow-sm
               text-left transition-[border-color,box-shadow,colors] duration-200
               hover:border-ink/20;
      }
      a.field {
        @apply cursor-pointer no-underline;
      }
      button.field {
        @apply cursor-pointer appearance-none bg-paper text-left;
      }
      a.field:focus-visible,
      button.field:focus-visible {
        @apply outline-none ring-[3px] ring-offset-2 ring-ink ring-offset-paper;
      }
      .field__value {
        @apply min-w-0 flex-1 truncate font-title text-2xl leading-none text-ink;
      }
      .field__trail {
        @apply shrink-0 text-ink-muted;
      }
      .input {
        @apply box-border h-11 min-h-11 w-full rounded-pill border border-border-default bg-paper
               px-4 font-sans text-base font-normal leading-normal text-ink shadow-sm
               placeholder:text-ink-muted
               transition-[border-color,box-shadow] duration-200
               hover:border-ink/15
               focus:border-ink focus:outline-none focus:ring-[3px] focus:ring-ink/25
               focus:ring-offset-2 focus:ring-offset-canvas;
      }
      .input:disabled {
        @apply cursor-not-allowed border-border-subtle bg-disabled-bg text-disabled-fg;
      }

      .chip {
        @apply inline-flex items-center gap-2 px-4 h-9 rounded-pill text-sm font-semibold
               bg-paper border border-border-default text-ink
               hover:bg-cream hover:border-ink cursor-pointer transition-colors;
      }
      .chip[data-selected="true"] { @apply bg-ink text-paper border-ink; }

      .chat-chip--multi.is-selected {
        @apply border-[#D4537E]/55 bg-[#FBEAF0] text-[#72243E];
        box-shadow: 0 0 0 2px rgba(212, 83, 126, 0.35);
      }
    }

    /* Moodboard palette chips — thumbnail swatches + label (see PALETTE_CHIPS.swatches) */
    .chat-chip.chat-chip--palette {
      display: inline-flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.45rem 0.75rem 0.55rem;
      border-radius: 0.85rem;
      max-width: min(100%, 17rem);
      text-align: left;
    }
    .chat-chip--palette .chat-chip-palette-swatches {
      display: flex;
      width: 100%;
      gap: 4px;
    }
    .chat-chip--palette .chat-chip-palette-swatches span {
      flex: 1 1 0;
      min-width: 0;
      height: 1.3rem;
      border-radius: 0.3rem;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.12);
    }
    .chat-chip--palette .chat-chip-palette-label {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: 0.01em;
    }

    .chat-summary-card {
      margin-top: 0.5rem;
      border-radius: 12px;
      border: 0.5px solid rgba(207, 197, 187, 0.45);
      background: rgba(255, 255, 255, 0.65);
      padding: 0.75rem 1rem;
      font-size: 12.5px;
      line-height: 1.45;
    }
    .chat-summary-row {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.2rem 0;
      color: rgba(76, 70, 63, 0.82);
    }
    .chat-summary-row span:last-child {
      font-weight: 600;
      color: #1b1c1c;
      text-align: right;
      max-width: 58%;
    }

    /* ============ Opening canvas timeline (the 7-step journey) ============ */
    .how-timeline {
      position: relative;
      list-style: none;
      margin: 0;
      padding: 0;
      max-width: 44rem;
    }
    .how-timeline::before,
    .how-timeline::after {
      content: "";
      position: absolute;
      top: 1.25rem;
      bottom: 1.25rem;
      left: 1.25rem;
      width: 2px;
      border-radius: 9999px;
      pointer-events: none;
    }
    .how-timeline::before {
      background: var(--color-border-default, #C9C2B6);
      opacity: 0.55;
    }
    .how-timeline::after {
      background: linear-gradient(180deg, var(--color-copper, #B4814D), var(--color-copper-active, #805B33));
      transform-origin: top;
      transform: scaleY(var(--how-progress, 0));
      transition: transform 700ms cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .how-step {
      position: relative;
      padding: 0 0 1.6rem 4rem;
    }
    .how-step:last-child {
      padding-bottom: 0;
    }
    @media (min-width: 640px) {
      .how-step { padding-bottom: 1.85rem; }
    }

    .how-step__node {
      position: absolute;
      top: 0.2rem;
      left: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 9999px;
      border: 2px solid var(--color-border-default, #C9C2B6);
      background: var(--color-paper, #FFFFFF);
      color: transparent;
      box-shadow: 0 1px 0 rgba(42, 42, 40, 0.06);
      transition:
        background 500ms cubic-bezier(0.4, 0.2, 0.2, 1),
        border-color 500ms cubic-bezier(0.4, 0.2, 0.2, 1),
        color 200ms cubic-bezier(0.4, 0.2, 0.2, 1) 200ms,
        transform 500ms cubic-bezier(0.4, 0.2, 0.2, 1);
      z-index: 1;
    }
    .how-step__check {
      width: 1.15rem;
      height: 1.15rem;
    }
    .how-step__check path {
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      transition: stroke-dashoffset 600ms cubic-bezier(0.4, 0.2, 0.2, 1) 250ms;
    }
    .how-step__index {
      position: absolute;
      inset: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans, system-ui);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--color-ink-soft, #5A554D);
      transition: opacity 220ms cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .how-step__card {
      position: relative;
      background: var(--color-canvas, #F5EFE6);
      border: 1px solid var(--color-border-subtle, #E5E0D8);
      border-radius: 0.95rem;
      padding: 1rem 1.1rem 1rem 1.25rem;
    }
    @media (min-width: 640px) {
      .how-step__card { padding: 1.1rem 1.4rem; }
    }
    .how-step__card::before {
      content: "";
      position: absolute;
      top: 1.4rem;
      left: -0.85rem;
      width: 0.85rem;
      height: 1px;
      background: var(--color-border-default, #C9C2B6);
      opacity: 0.55;
    }

    .how-timeline.is-animating .how-step__card {
      opacity: 0;
      transform: translateY(0.5rem);
      transition:
        opacity 600ms cubic-bezier(0.4, 0.2, 0.2, 1),
        transform 600ms cubic-bezier(0.4, 0.2, 0.2, 1);
      transition-delay: calc(var(--how-step-index, 0) * 60ms);
    }

    .how-step.is-active .how-step__node {
      background: var(--color-copper, #B4814D);
      border-color: var(--color-copper, #B4814D);
      color: var(--color-paper, #FFFFFF);
      transform: scale(1.06);
    }
    .how-step.is-active .how-step__check path {
      stroke-dashoffset: 0;
    }
    .how-step.is-active .how-step__index {
      opacity: 0;
    }
    .how-timeline.is-animating .how-step.is-active .how-step__card {
      opacity: 1;
      transform: translateY(0);
    }

    .how-step.is-current .how-step__card {
      border-color: rgba(180, 129, 77, 0.55);
      box-shadow: 0 6px 18px rgba(180, 129, 77, 0.12);
    }
    .how-step.is-current .how-step__card::before {
      background: var(--color-copper, #B4814D);
      opacity: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      .how-timeline::after,
      .how-step__node,
      .how-step__check path,
      .how-timeline.is-animating .how-step__card {
        transition: none !important;
      }
      .how-timeline.is-animating .how-step__card {
        opacity: 1;
        transform: none;
      }
    }

    /* Seven-step cards in main chat column — compact in-thread variant */
    .journey-timeline-host {
      background: rgba(255, 250, 240, 0.16);
      color: #fffaf0;
    }
    .journey-timeline-host .how-timeline {
      max-width: none;
    }
    .journey-timeline-host .how-timeline::before,
    .journey-timeline-host .how-timeline::after {
      top: 0.85rem;
      bottom: 0.85rem;
      left: 0.85rem;
    }
    .journey-timeline-host .how-step {
      padding: 0 0 0.55rem 2.45rem;
    }
    @media (min-width: 640px) {
      .journey-timeline-host .how-step { padding-bottom: 0.65rem; }
    }
    .journey-timeline-host .how-step__node {
      width: 1.7rem;
      height: 1.7rem;
      border-width: 1.5px;
      top: 0.05rem;
    }
    .journey-timeline-host .how-step__check { width: 0.8rem; height: 0.8rem; }
    .journey-timeline-host .how-step__index { font-size: 0.62rem; }
    .journey-timeline-host .how-step__card {
      padding: 0.5rem 0.75rem;
      border-radius: 0.6rem;
      background: rgba(255, 250, 240, 0.92);
    }
    @media (min-width: 640px) {
      .journey-timeline-host .how-step__card { padding: 0.55rem 0.85rem; }
    }
    .journey-timeline-host .how-step__card::before {
      top: 0.85rem;
      left: -0.55rem;
      width: 0.55rem;
    }
    .journey-timeline-host .journey-compact-eyebrow {
      font-family: var(--font-sans, system-ui);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      color: rgba(255, 250, 240, 0.85);
    }
    .journey-timeline-host .journey-compact-progress {
      font-variant-numeric: tabular-nums;
      color: rgba(255, 250, 240, 0.85);
    }

    /* Collapsible header — entire row is the click target */
    .journey-collapse-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      width: 100%;
      margin: 0;
      padding: 0.15rem 0;
      background: transparent;
      border: 0;
      cursor: pointer;
      color: inherit;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .journey-collapse-toggle:focus-visible {
      outline: 2px solid rgba(255, 250, 240, 0.6);
      outline-offset: 2px;
      border-radius: 0.35rem;
    }
    .journey-collapse-toggle__right {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
    }
    .journey-collapse-chevron {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.55rem;
      height: 1.55rem;
      border-radius: 9999px;
      background: rgba(255, 250, 240, 0.16);
      border: 1px solid rgba(255, 250, 240, 0.22);
      color: #fffaf0;
      transition: background-color 200ms ease, border-color 200ms ease;
    }
    .journey-collapse-toggle:hover .journey-collapse-chevron {
      background: rgba(255, 250, 240, 0.28);
      border-color: rgba(255, 250, 240, 0.32);
    }
    .journey-collapse-chevron svg {
      width: 0.85rem;
      height: 0.85rem;
      transition: transform 240ms cubic-bezier(0.4, 0.2, 0.2, 1);
    }
    .journey-timeline-host[data-journey-collapsed="true"] .journey-collapse-chevron svg {
      transform: rotate(-180deg);
    }

    /* Collapsing shell wraps the <ol> so we can animate height + fade */
    .journey-collapse-shell {
      overflow: hidden;
      max-height: 1400px;
      opacity: 1;
      margin-top: 0.5rem;
      transition:
        max-height 320ms cubic-bezier(0.4, 0.2, 0.2, 1),
        opacity 220ms ease,
        margin-top 320ms cubic-bezier(0.4, 0.2, 0.2, 1);
    }
    .journey-timeline-host[data-journey-collapsed="true"] .journey-collapse-shell {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      pointer-events: none;
    }
    .journey-timeline-host[data-journey-collapsed="true"] {
      padding-bottom: 0.5rem;
    }
    @media (prefers-reduced-motion: reduce) {
      .journey-collapse-chevron svg,
      .journey-collapse-shell {
        transition: none !important;
      }
    }

    /* Save my date — swipe hold + confetti (hero / urgency Figma 290:392) */
    .aiw-save-hero {
      position: relative;
      min-height: 200px;
    }
    @media (min-width: 640px) {
      .aiw-save-hero {
        min-height: 260px;
      }
    }
    .aiw-save-brand .aiw-save-brand-save {
      background: linear-gradient(118deg, #6a5a45 0%, #b4814d 42%, #5a4a38 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    @supports not (background-clip: text) {
      .aiw-save-brand .aiw-save-brand-save {
        color: #6a5a45;
      }
    }
    .aiw-hold-track {
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }
    .aiw-hold-track--success {
      animation: aiw-hold-glow 0.85s ease-out 1;
    }
    @keyframes aiw-hold-glow {
      0% { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06), 0 0 0 0 rgba(202, 145, 81, 0); }
      35% { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12), 0 0 0 6px rgba(202, 145, 81, 0.35); }
      100% { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06), 0 0 0 0 rgba(202, 145, 81, 0); }
    }
    .aiw-hold-thumb {
      user-select: none;
      touch-action: none;
      will-change: left;
    }
    .aiw-hold-thumb.is-celebrate {
      animation: aiw-thumb-pop 0.55s cubic-bezier(0.34, 1.45, 0.64, 1) 1;
    }
    @keyframes aiw-thumb-pop {
      0%, 100% { transform: scale(1); }
      45% { transform: scale(1.12); }
    }
    .aiw-confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }
    .aiw-confetti-piece {
      position: absolute;
      width: 7px;
      height: 11px;
      border-radius: 1px;
      opacity: 1;
      background: var(--c, #b4814d);
      animation: aiw-confetti-fly var(--t, 0.95s) ease-out forwards;
    }
    @keyframes aiw-confetti-fly {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx, 0), var(--dy, 0)) rotate(var(--rot, 360deg)) scale(0.35);
        opacity: 0;
      }
    }

    /* ============ Save my date — social pressure + time-bonus perks ============
       Live "X brides looking now" pulse + three perks tied to specific cutoffs.
       Each perk shows a live countdown and gracefully expires when its window
       closes. Driven by tick() inside renderSaveDateCanvas(). */
    .aiw-social-pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      background: #ca9151;
      box-shadow: 0 0 0 0 rgba(202, 145, 81, 0.55);
      animation: aiw-social-pulse 1.6s ease-out infinite;
    }
    @keyframes aiw-social-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(202, 145, 81, 0.55); transform: scale(1); }
      70%  { box-shadow: 0 0 0 9px rgba(202, 145, 81, 0); transform: scale(1.08); }
      100% { box-shadow: 0 0 0 0 rgba(202, 145, 81, 0);    transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .aiw-social-pulse { animation: none; }
    }
    .aiw-perk-tile {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid rgba(202, 145, 81, 0.32);
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(243, 230, 211, 0.55) 0%, rgba(252, 249, 248, 0.92) 100%);
      transition: border-color 240ms ease, background-color 240ms ease, opacity 240ms ease;
    }
    .aiw-perk-tile + .aiw-perk-tile { margin-top: 10px; }
    .aiw-perk-tile__icon {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      border-radius: 9999px;
      background: rgba(202, 145, 81, 0.16);
      color: var(--color-tan-700, #9a6e40);
      display: grid;
      place-items: center;
    }
    .aiw-perk-tile__body { min-width: 0; flex: 1; }
    .aiw-perk-tile__cutoff {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-tan-700, #9a6e40);
    }
    .aiw-perk-tile__label {
      font-family: var(--font-title);
      font-size: 16px;
      line-height: 1.18;
      color: var(--color-ink);
      margin-top: 2px;
    }
    .aiw-perk-tile__sub {
      font-size: 11.5px;
      color: var(--color-ink-muted);
      margin-top: 3px;
    }
    .aiw-perk-tile__time {
      flex-shrink: 0;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .aiw-perk-tile__time-num {
      display: block;
      font-family: var(--font-title);
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--color-tan-700, #9a6e40);
    }
    .aiw-perk-tile__time-status {
      display: block;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-ink-muted);
      margin-top: 2px;
    }
    .aiw-perk-tile.is-expired {
      opacity: 0.45;
      border-color: rgba(180, 180, 175, 0.4);
      background: var(--color-paper);
    }
    .aiw-perk-tile.is-expired .aiw-perk-tile__label { text-decoration: line-through; }
    .aiw-perk-tile.is-expired .aiw-perk-tile__cutoff,
    .aiw-perk-tile.is-expired .aiw-perk-tile__time-num { color: var(--color-ink-muted); }

    /* Venue matching interstitial (Step 3 transition) */
    .aiw-match-interstitial {
      position: relative;
      isolation: isolate;
      min-height: min(72dvh, 620px);
      border-radius: 1rem;
      background: radial-gradient(120% 80% at 50% 0%, #2f2e2a 0%, #1a1916 45%, #121110 100%);
      color: #f8f8f6;
      transition:
        opacity 0.38s ease,
        transform 0.38s ease;
    }
    .aiw-match-interstitial.aiw-match-interstitial--out {
      opacity: 0;
      transform: scale(0.985);
    }
    .aiw-match-interstitial::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;

    function chipButtonInnerHtml(it) {
      const sw = it.swatches;
      if (Array.isArray(sw) && sw.length) {

          .join("");
        return `<span class="chat-chip-palette-swatches" aria-hidden="true">${cells}</span><span class="chat-chip-palette-label">${escapeHtml(it.label)}</span>`;
      }
      const icon = it.icon
        ? `<span class="chat-chip-icon" aria-hidden="true">${escapeHtml(it.icon)}</span>`
        : "";
      const caption = it.caption
        ? `<span class="chat-chip-caption">${escapeHtml(it.caption)}</span>`

      const labelStack = `<span class="chat-chip-label-stack"><span class="chat-chip-label">${escapeHtml(it.label)}</span>${caption}</span>`;
      return `${icon}${labelStack}`;
    }

    /**
     * Render quick-reply chips. Each item supports: label, icon, caption, swatches,
     * plus arbitrary handler payload (value/action/etc.). The leading chip animates
     * in first via CSS variable `--chip-i`, and a brief press-bounce plays before
     * dispatching the choice so the click feels tactile.
     */
    function setChips(items, onPick) {
      if (!chipsEl) return;
      chipsEl.innerHTML = "";
      items.forEach((it, i) => {
        const palette = Array.isArray(it.swatches) && it.swatches.length;
        const cls = palette ? "chat-chip chat-chip--palette" : "chat-chip";
        const c = $h(`<button type="button" class="${cls}" style="--chip-i:${i}">${chipButtonInnerHtml(it)}</button>`);
        let firing = false;
        c.addEventListener("click", () => {
          if (firing) return;
          firing = true;
          c.setAttribute("data-pressed", "true");
          [...chipsEl.children].forEach(el => {
            if (el !== c) el.style.pointerEvents = "none";
          });
          const reduceMotion =
            typeof window !== "undefined" &&
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          const dispatch = () => {
            setChips([], null);
            Promise.resolve(onPick?.(it)).catch(err => console.error("plan: chip handler", err));
          };
          if (reduceMotion) dispatch();
          else setTimeout(dispatch, 130);
        });
        chipsEl.appendChild(c);
      });
    }

    /** Module-level UI state — persists across re-renders within a session. */
    let journeyCollapsed = false;

    function wireJourneyCollapseToggle(host) {
      const btn = host.querySelector("#journey-collapse-toggle");
      if (!btn) return;
      btn.addEventListener("click", () => {
        journeyCollapsed = !journeyCollapsed;
        host.setAttribute("data-journey-collapsed", journeyCollapsed ? "true" : "false");
        btn.setAttribute("aria-expanded", journeyCollapsed ? "false" : "true");
        btn.setAttribute("aria-label", journeyCollapsed ? "Expand your journey" : "Collapse your journey");
      });
    }

    /** Drives the gradient line + active dots on the canvas timeline as we move through chapters. */
    function animateTimelineProgress() {
      const tl = document.getElementById("planner-timeline");
      if (!tl) return;
      const total = activeChaptersList().length;
      const displayIdx = activeDisplayIdx();
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const ratio = total ? Math.min(1, (displayIdx + 1) / total) : 0;
      tl.style.setProperty("--how-progress", String(ratio));
      tl.classList.toggle("is-animating", !reduceMotion);
      [...tl.querySelectorAll(".how-step")].forEach((el, idx) => {
        el.classList.toggle("is-current", idx === displayIdx);
        el.classList.toggle("is-active", idx <= displayIdx);
      });
      const compactProgress = document.getElementById("journey-compact-progress");
      if (compactProgress) {
        compactProgress.textContent = `Step ${displayIdx + 1} / ${total}`;
      }
    }

    function matchScoreHash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
      return Math.abs(h);
    }

    /** Rough mid-point of selected budget band for mock “fit” vs property fromUSD */
    function budgetMidEstimateUsd() {
      const b = String(pkg.budgetBand || "").toLowerCase();
      if (b.includes("under") || b.includes("<")) return 25000;
      if (b.includes("30") && b.includes("60")) return 45000;
      if (b.includes("60") && b.includes("100")) return 80000;
      if (b.includes("100") && b.includes("175")) return 135000;
      if (b.includes("175") && b.includes("300")) return 240000;
      if (b.includes("300")) return 360000;
      return 75000;
    }

    /**
     * Deterministic “% match for you” for Planning board tiles (prototype heuristic:
     * moodboard vibe, region, guest scale, budget vs estimate, list rank, upcoming).
     */
    function venueMatchPercentForYou(h, rankIndex) {
      const key = `${h.id}|${pkg.vibeId || ""}|${pkg.region || ""}|${pkg.guests || 0}|${pkg.budgetBand || ""}|${pkg.date || ""}|${rankIndex}`;
      let score = 88 - rankIndex * 3 + (matchScoreHash(key) % 5) - 2;
      if (pkg.region && h.region === pkg.region) score += 4;
      if (pkg.region && h.region !== pkg.region) score -= 20;
      const mid = budgetMidEstimateUsd();
      const p = h.fromUSD || 0;
      if (mid > 0 && p > 0) {
        const rel = p / mid;
        if (rel >= 0.65 && rel <= 1.2) score += 5;
        else if (rel <= 1.45) score += 2;
        else score -= 4;
      }
      const g = pkg.guests || 0;
      if (g >= 140 && p >= 35000) score += 2;
      if (g > 0 && g <= 60 && p > 0 && p <= 48000) score += 2;
      const v = pkg.vibeId || "";
      if (v === "minimalist-stone" && h.brand === "nobu") score += 3;
      if (v === "cinematic-noir" && h.brand === "hard-rock") score += 2;
      if (v === "boho-jungle" && (h.brand === "unico" || h.brand === "ava")) score += 2;
      if (v === "tropical-sunset" && h.region === "caribbean") score += 2;
      if (v === "soft-romantic") score += 1;
      if (v === "mystic-cenote" && (h.brand === "unico" || /tulum|riviera/i.test(h.city || ""))) score += 2;
      if (h.upcoming) score -= 6;
      return Math.min(98, Math.max(66, Math.round(score)));
    }

      const pct = venueMatchPercentForYou(h, rankIndex);
      return `<span class="pointer-events-none absolute ${positionClass} z-[2] rounded-full bg-[rgba(12,11,10,0.66)] px-2.5 py-1 text-[11px] font-semibold leading-none text-white shadow-sm ring-1 ring-white/18 backdrop-blur-[3px]">${pct}% match for you</span>`;

    async function pickSpaceFromHotelDetail(spaceId, hotelId) {
      const s = byId(SPACES, spaceId);
      const h = byId(HOTELS, hotelId);

      enterChapter(3);
      animateTimelineProgress();
      clearChips();
      textHandler = null;
      pkg.hotelId = h.id;
      pkg.spaceId = null;
      refreshPackage();
      openSpaceDetail(spaceId);

    async function pickVenue(hotelId) {
      const h = byId(HOTELS, hotelId);
      pkg.hotelId = hotelId;
      pkg.spaceId = null;
      refreshPackage();
      userSay(`I like ${h.name}.`);
      await bot(`<strong>${h.name}</strong> — beautiful choice. ${h.blurb}`);

      await beginSpaceDesign();

    /** Figma RCD 202:107 — Space / venue detail (hero, trust, capacity, dossier, stories, other spaces). */
    function splitSpaceTitle(name) {
      const w = name.trim().split(/\s+/);
      if (w.length >= 2) {
        const mid = Math.ceil(w.length / 2);
        return { lineA: w.slice(0, mid).join(" "), lineB: w.slice(mid).join(" ") };
      }
      return { lineA: name, lineB: "" };
    }

    function spaceCapacityStatsForDetail(s) {
      const g = Math.max(40, s.capacity || 100);
      const tier = Math.max(50, Math.round(g / 25) * 25);
      return {
        ceremony: Math.min(950, tier * 5),
        cocktail: Math.min(950, tier * 5),
        reception: Math.min(650, Math.round(tier * 3.2)),
      };
    }

    function spaceFeaturedTags(s) {
      const v = s.vibe || [];
      return [
        v[0] ? `${s.type} · ${v[0]}` : `${s.type} · Pacific views`,
        v[1] || `Largest ${s.type.toLowerCase()} flow`,
        v[2] || "Sunset-facing",
      ];
    }

    function allieVenueDossierHtml(s, hotel) {
      const loc = escapeHtml(hotel.city || "the coast");
      return `Book your ceremony for <strong>5:30pm</strong> if you land on <strong>${escapeHtml(s.name)}</strong> — in ${loc}, onshore breezes usually ease after <strong>4:30</strong>, and by <strong>6pm</strong> the light skims this setup in a way that's hard to storyboard. Tell your photographer to bracket the <strong>north edge at 6:15</strong> for the silhouette everyone prints. Most couples don't plan for that minute — you will.`;
    }

      function syncSpaceSavedButtons() {

        const top = document.getElementById("space-detail-save-top");
        const foot = document.getElementById("space-detail-save-foot");
        [top, foot].forEach(b => {
          if (!b) return;
          b.setAttribute("aria-pressed", on ? "true" : "false");
          const svg = b.querySelector("svg");
          if (svg) svg.setAttribute("fill", on ? "currentColor" : "none");
          b.classList.toggle("text-red-600", on && b.id === "space-detail-save-top");
          b.classList.toggle("text-red-400", on && b.id === "space-detail-save-foot");
        });
      }

      document.getElementById("space-detail-back")?.addEventListener("click", () => renderSpacesCanvas(hotel));

        if (spaceDetailSaved.has(s.id)) spaceDetailSaved.delete(s.id);
        else spaceDetailSaved.add(s.id);

      document.getElementById("space-detail-save-foot")?.addEventListener("click", () => {

    /* ============ STEP 5 · ADD-ONS / VENDOR MARKETPLACE ============ */
    async function beginAddons() {
      enterChapter(4);
      animateTimelineProgress();
      clearChips();
      textHandler = null;
      const intro = pkg.expedited
        ? `<strong>Vendor marketplace.</strong> Five categories, one running total. Tap to add — the price calculator updates live.`
        : `Next, <strong>add-ons</strong>. Toggle anything you want; the running total moves live.`;
      await bot(intro);
      renderAddonsCanvas();

    /* Calculator helpers — kept lightweight so the Add-ons step stays snappy. */
    const bookPackage  = () => BOOK_PACKAGES.find(p => p.id === pkg.bookPackageId) || null;
    const bookAddonsList = () => BOOK_ADDONS.filter(a => (pkg.addonIds || []).includes(a.id));

    function bookPriceBreakdown() {
      const p = bookPackage();
      const guests = Math.max(pkg.guests || 0, 1);
      const space = pkg.spaceId ? byId(SPACES, pkg.spaceId) : null;
      const pkgFee = p ? (p.basePerGuest * guests + p.baseFee) : 0;
      const addonsTotal = bookAddonsList().reduce((s, a) => s + a.price, 0);
      const venue  = space ? space.fromUSD : 0;
      const subtotal = pkgFee + addonsTotal + venue;
      return { pkgFee, addons: addonsTotal, venue, subtotal };
    }

    function renderRunningEstimate(extraSubline = "") {
      const b = bookPriceBreakdown();
      const p = bookPackage();
      const space = pkg.spaceId ? byId(SPACES, pkg.spaceId) : null;
      const guests = pkg.guests || "—";
      const date   = pkg.date || "Date TBD";
      const lines = [];
      if (p) lines.push(`<div class="flex justify-between"><span class="text-ink-soft">${p.name} · ${guests} guests</span><span>${usd(b.pkgFee)}</span></div>`);
      bookAddonsList().forEach(a => {
        lines.push(`<div class="flex justify-between"><span class="text-ink-soft">${a.label}</span><span>${usd(a.price)}</span></div>`);
      });
      if (space) lines.push(`<div class="flex justify-between"><span class="text-ink-soft">${space.name} (room rental)</span><span>${usd(b.venue)}</span></div>`);

      return `
        <div class="aiw-card mb-6">
          <div class="flex items-center justify-between">
            <p class="aiw-eyebrow aiw-eyebrow--tan">Running estimate</p>
            <p class="text-[12px] text-[color:var(--color-sage-600)]">${guests} guests · ${escapeHtml(date)}</p>
          </div>
          <p class="aiw-display-price--lg aiw-display-price">${usd(b.subtotal)}</p>
          ${extraSubline ? `<p class="text-xs text-ink-muted">${extraSubline}</p>` : ""}
          <div class="space-y-1 text-sm">
            ${lines.length ? lines.join("") : `<p class="text-ink-muted">Pick a venue and space to start the calculator.</p>`}
          </div>
          ${b.subtotal ? `
            <div class="border-t border-[color:var(--color-border-default)]/60 pt-2.5 flex items-baseline justify-between">

              <span class="font-semibold text-[color:var(--color-tan-500)]">$500</span>

    /**
     * Vendor marketplace canvas. Items are grouped into the five ADDON_CATEGORIES
     * so the choice feels like browsing a real marketplace — each tile shows the
     * vendor name + a one-line tagline alongside the price. Selection state is
     * still driven by `pkg.addonIds` and the running estimate is unchanged.
     */
    function renderAddonsCanvas() {
      const calc = renderRunningEstimate();
      const groupsHtml = ADDON_CATEGORIES.map(cat => {
        const items = BOOK_ADDONS.filter(a => a.category === cat.id);
        if (!items.length) return "";
        const tiles = items.map(a => {
          const selected = (pkg.addonIds || []).includes(a.id);
          return `
            <button type="button" data-addon="${a.id}"

      const headline = pkg.expedited ? "Browse vetted vendors." : "Dress the day.";

        ? "Each vendor is pre-negotiated and bookable through the calculator. Stack as many as you want — the price updates live."

      const continueLabel = pkg.expedited ? "Continue → see your proposal" : "Continue → see your quote";

    function burstConfetti(anchorEl) {
      const reduce = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches;
      const root = document.createElement("div");
      root.className = "aiw-confetti-layer";
      root.setAttribute("aria-hidden", "true");
      const rect = anchorEl?.getBoundingClientRect?.() || { left: innerWidth / 2, top: innerHeight / 3, width: 0, height: 0 };
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const colors = ["#B4814D", "#CA9151", "#E8D5BD", "#F5EFE6", "#2A2A28", "#D4537E", "#ffffff"];
      const count = reduce ? 14 : 52;
      for (let i = 0; i < count; i++) {
        const p = document.createElement("span");
        p.className = "aiw-confetti-piece";
        const ang = (Math.PI * 2 * i) / count + Math.random() * 0.35;
        const dist = 70 + Math.random() * 200;
        p.style.setProperty("--dx", `${Math.cos(ang) * dist}px`);
        p.style.setProperty("--dy", `${Math.sin(ang) * dist - 30 * Math.random()}px`);
        p.style.setProperty("--rot", `${Math.random() * 540 - 270}deg`);
        p.style.setProperty("--c", colors[i % colors.length]);
        p.style.setProperty("--t", `${reduce ? 0.35 : 0.55 + Math.random() * 0.45}s`);
        p.style.left = `${cx}px`;
        p.style.top = `${cy}px`;
        root.appendChild(p);
      }
      document.body.appendChild(root);
      setTimeout(() => root.remove(), 2200);
    }

    function attachHoldSwipe() {
      depositSwipeCleanup?.();
      depositSwipeCleanup = null;
      const track = document.getElementById("hold-swipe-track");
      const thumb = document.getElementById("hold-swipe-thumb");
      const progressEl = document.getElementById("hold-swipe-progress");
      const hint = document.getElementById("hold-swipe-hint");
      const titleEl = document.getElementById("hold-cta-title");
      if (!track || !thumb) return;

      let completed = false;
      let drag = false;
      let startX = 0;
      let originLeft = 0;

      function readLayout() {
        const pad = 10;
        const w = thumb.offsetWidth || 42;
        const maxL = Math.max(pad, track.clientWidth - w - pad);
        const minL = pad;
        return { minL, maxL };
      }

      function placeThumbRight() {
        const { minL, maxL } = readLayout();
        thumb.style.transition = "left 0.4s cubic-bezier(0.34, 1.45, 0.64, 1)";
        thumb.style.left = `${maxL}px`;
        thumb.style.right = "auto";
        if (progressEl) progressEl.style.opacity = "0";
        return { minL, maxL };
      }

      placeThumbRight();

      const onMove = e => {
        if (!drag || completed) return;
        const { minL, maxL } = readLayout();
        const dx = e.clientX - startX;
        let nl = originLeft + dx;
        nl = Math.max(minL, Math.min(maxL, nl));
        thumb.style.transition = "none";
        thumb.style.left = `${nl}px`;
        const span = maxL - minL || 1;
        const p = (maxL - nl) / span;
        if (progressEl) progressEl.style.opacity = String(Math.min(0.5, p * 0.65));
      };

      const onUp = async e => {
        if (!drag) return;
        drag = false;
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);
        document.removeEventListener("pointercancel", onUp);
        if (completed) return;
        const { minL, maxL } = readLayout();
        const span = maxL - minL || 1;
        const nl = thumb.offsetLeft;
        const pull = (maxL - nl) / span;

        if (pull > 0.72) {
          completed = true;
          thumb.style.transition = "left 0.28s cubic-bezier(0.22, 1, 0.36, 1)";
          thumb.style.left = `${minL}px`;
          if (shouldSimulateDateConflict()) {
            await bot(`That weekend just got a simultaneous hold — <strong>${escapeHtml(pkg.date || "your dates")}</strong> is no longer open at ${escapeHtml(byId(SPACES, pkg.spaceId)?.name || "that space")}. Here are the clean pivots that keep your package math honest.`);
            holdCountdownCleanup?.();
            holdCountdownCleanup = null;
            renderDateConflictCanvas();
            return;
          }

          track.classList.add("aiw-hold-track--success");
          thumb.classList.add("is-celebrate");
          if (titleEl) titleEl.textContent = "Date saved!";
          if (hint) {
            hint.textContent = "You're in · concierge next";
            hint.classList.remove("text-copper/90");
            hint.classList.add("text-white/90");
          }
          try {
            navigator.vibrate?.([10, 35, 15]);
          } catch { /* ignore */ }
          burstConfetti(track);
          await new Promise(r => setTimeout(r, 520));
          const s = pkg.spaceId ? byId(SPACES, pkg.spaceId) : null;
          const hotel = s ? byId(HOTELS, s.hotelId) : null;
          if (s && hotel) await finishHoldCelebration(s, hotel);
          return;
        }

        thumb.style.transition = "left 0.42s cubic-bezier(0.34, 1.45, 0.64, 1)";
        thumb.style.left = `${maxL}px`;
        if (progressEl) progressEl.style.opacity = "0";
      };

      const onDown = e => {
        if (completed) return;
        e.preventDefault();
        drag = true;
        startX = e.clientX;
        originLeft = thumb.offsetLeft;
        document.addEventListener("pointermove", onMove);
        document.addEventListener("pointerup", onUp);
        document.addEventListener("pointercancel", onUp);
      };

      thumb.addEventListener("pointerdown", onDown);
      depositSwipeCleanup = () => {
        thumb.removeEventListener("pointerdown", onDown);
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);
        document.removeEventListener("pointercancel", onUp);
      };
    }

      };
      const tick = () => {
        const el = document.getElementById("hold-countdown-display");
        const bar = document.getElementById("hold-urgency-bar-fill");
        if (!el) {
          if (holdCountdownCleanup) {
            holdCountdownCleanup();
            holdCountdownCleanup = null;
          }
          return;
        }
        const ms = Math.max(0, deadline - Date.now());
        el.textContent = fmtHMS(ms);
        if (bar) bar.style.width = `${Math.max(6, (ms / fullMs) * 100)}%`;
        // Update each time-bonus perk in place; flag is-expired when its
        // window closes so the tile gracefully strikes through.
        PERK_CUTOFFS.forEach(p => {
          const tile = document.querySelector(`[data-perk="${p.id}"]`);
          if (!tile) return;
          const cutoff = start + p.hours * 60 * 60 * 1000;
          const remaining = Math.max(0, cutoff - Date.now());
          const timer = tile.querySelector("[data-perk-timer]");
          const status = tile.querySelector("[data-perk-status]");
          if (remaining > 0) {
            if (timer) timer.textContent = fmtHMS(remaining);
            if (status) status.textContent = "left to claim";
            tile.classList.remove("is-expired");
          } else {
            if (timer) timer.textContent = "Expired";
            if (status) status.textContent = "missed window";
            tile.classList.add("is-expired");
          }
        });
      };
      tick();
      const tid = setInterval(tick, 1000);
      holdCountdownCleanup = () => clearInterval(tid);

      document.getElementById("deposit-cancel")?.addEventListener("click", () => {
        holdCountdownCleanup?.();
        holdCountdownCleanup = null;
        depositSwipeCleanup?.();
        depositSwipeCleanup = null;
        enterChapter(5);
        animateTimelineProgress();
        renderQuoteCanvas();
        void bot(`No rush — proposal's still here. Tap <strong>Save my date</strong> again whenever you're ready.`);
      }, { once: true });
      document.getElementById("deposit-confirm")?.addEventListener("click", () => void confirmDeposit(), { once: true });

      document.getElementById("deposit-site-visit-primary")?.addEventListener("click", () => {
        void bot(`Love that instinct — tell me your travel window and I'll line up site-visit slots with your 25% perk baked in.`);
        document.getElementById("text-input")?.focus();
      });
      document.querySelector("[data-hold-next-share]")?.addEventListener("click", () => {
        void bot(`Copy this screen or drop their email — I'll package the hold + estimate so they see exactly what you see.`);
        document.getElementById("text-input")?.focus();
      });

      requestAnimationFrame(() => {
        attachHoldSwipe();
      });
    }

    /** Prototype: conflict when date is Summer 2027, or once per tab session when `?dateTaken=1`. */
    function shouldSimulateDateConflict() {
      const q = new URLSearchParams(window.location.search).get("dateTaken") === "1";
      if (q && !sessionStorage.getItem("aiw-dateConflictDemoShown")) return true;
      return /summer\s*2027/i.test(pkg.date || "");
    }

    function usdApproxK(subtotal) {
      if (!subtotal || subtotal < 1000) return usd(subtotal || 0);
      return `~$${Math.max(1, Math.round(subtotal / 1000))}k`;
    }

    function roughSubtotalForSpace(spaceId) {
      const p = bookPackage();
      const guests = Math.max(Number(pkg.guests) || 0, 1);
      const sp = byId(SPACES, spaceId);
      if (!p || !sp) return 0;
      const pkgFee = p.basePerGuest * guests + p.baseFee;
      const addons = bookAddonsList().reduce((sum, x) => sum + x.price, 0);
      return pkgFee + addons + sp.fromUSD;
    }

    function suggestAlternateDateLabels() {
      const d = pkg.date || "";
      if (/summer\s*2027/i.test(d)) return ["Sep 19–21, 2027", "Oct 3–5, 2027"];
      if (/fall\s*2027/i.test(d)) return ["Nov 7–9, 2027", "Dec 5–7, 2027"];
      if (/spring\s*2027/i.test(d)) return ["May 15–17, 2027", "Jun 12–14, 2027"];
      return ["Alternate weekend A", "Alternate weekend B"];
    }

    /** Figma 316:2 — date taken: banner, Allie, same-venue date pills, alt space, nearby property, notify. */
    function renderDateConflictCanvas() {
      const s = byId(SPACES, pkg.spaceId);
      const hotel = s ? byId(HOTELS, s.hotelId) : null;
      const brand = hotel ? brandOfHotel(hotel.id) : null;
      if (!s || !hotel || !brand) return;

      if (new URLSearchParams(window.location.search).get("dateTaken") === "1") {
        try {
          sessionStorage.setItem("aiw-dateConflictDemoShown", "1");
        } catch { /* ignore */ }
      }

      const otherSpaces = spacesOf(hotel.id).filter(x => x.id !== s.id);
      const altSpace = otherSpaces[0] || null;
      const nearbyHotel = HOTELS.find(h => h.id !== hotel.id && h.region === hotel.region)
        || HOTELS.find(h => h.id !== hotel.id);
      const nearbySpace = nearbyHotel ? spacesOf(nearbyHotel.id)[0] : null;
      const altDates = suggestAlternateDateLabels();
      let altCount = 2;
      if (altSpace) altCount += 1;
      if (nearbyHotel && nearbySpace) altCount += 1;

      const b = bookPriceBreakdown();
      const estSame = usdApproxK(b.subtotal);
      const estAltSpace = altSpace ? usdApproxK(roughSubtotalForSpace(altSpace.id)) : "";
      const estNearby = nearbySpace ? usdApproxK(roughSubtotalForSpace(nearbySpace.id)) : "";

      let allieTail = ".";
      if (altSpace && nearbyHotel) allieTail = ", plus another venue on-property and a similar resort nearby with open dates.";
      else if (altSpace) allieTail = ", plus another venue on-property that's still available.";
      else if (nearbyHotel) allieTail = ", and a similar resort nearby with open dates.";
      const allieLead = `${escapeHtml(pkg.date || "That weekend")} is peak season at ${escapeHtml(brand.name)} — your exact block was just held by another couple. Good news: I found two open weekends close on the calendar${allieTail}`;

      const nearbyMeta = nearbyHotel
        ? [
          nearbyHotel.city && hotel.city ? `${nearbyHotel.city} · ${nearbyHotel.country}` : nearbyHotel.name,
          "Beachfront",
          "Dates fully open",
        ]
        : [];

      const altSpaceBadge = altSpace
        ? `Available ${/Sep/i.test(altDates[0]) ? "late Sep" : "this season"}`
        : "";

      setCanvas(`
        <div class="date-conflict-root -mx-2 -mt-2 sm:-mx-4" data-node-id="316:2">
          <div class="flex items-center gap-2 border-y border-border-default bg-[#edece8]/90 px-3 py-2 text-[12px] text-ink">
            <button type="button" id="date-conflict-back" class="inline-flex items-center gap-1 rounded-full border border-border-default bg-paper/80 px-2 py-1 text-ink-muted transition hover:bg-paper" aria-label="Back to quote">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 6 9 12l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <span class="text-ink-soft">·</span>
            <span class="font-medium text-ink">${escapeHtml(s.name)}</span>
            <span class="text-ink-muted">·</span>
            <span class="text-ink-muted">Availability</span>
          </div>

          <div class="mt-0 flex gap-2.5 border-b border-[#f5e6c8] bg-[#fdf1dc] px-4 py-3">
            <span class="mt-0.5 shrink-0 text-[#c47f12]" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 17h.01M10.3 3.2 2.4 18c-.5 1 .1 2.2 1.3 2.2h16.6c1.2 0 1.8-1.2 1.3-2.2L13.7 3.2c-.6-1-1.8-1-2.4 0Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <p class="min-w-0 text-[13px] leading-snug text-[#8a5a0a]">
              <span class="font-semibold text-[#6b4506]">${escapeHtml(s.name)} is fully booked for ${escapeHtml(pkg.date || "those dates")} within your budget.</span>
              <span class="font-normal text-[#b55106]"> Allie found ${altCount} alternatives that still work.</span>
            </p>
          </div>

          <div class="mt-5 flex gap-3 px-1">
            <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-copper shadow-sm" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="text-paper"><path d="M12 3 4 9v12h16V9l-8-6Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </div>
            <div class="min-w-0 flex-1 rounded-2xl rounded-tl-sm bg-[#edece8] px-4 py-4 text-[15px] leading-relaxed text-ink shadow-sm">
              ${allieLead}
            </div>
          </div>

          <div class="mt-6 px-1">
            <p class="text-[11px] font-semibold uppercase tracking-[0.14em] text-[color:var(--color-sage-600)]">Here's what's available</p>
          </div>

          <div class="mt-2 space-y-3 px-1 pb-2">
            <div class="rounded-[var(--radius-lg)] bg-[#edece8] p-4 shadow-sm">
              <span class="aiw-pill aiw-pill--sage text-[11px]">Best fit · same venue</span>
              <h3 class="font-title mt-2 text-[22px] leading-tight text-ink">${escapeHtml(s.name)}</h3>
              <p class="mt-1 text-[12px] text-ink-soft">Two open weekends · same ${escapeHtml(brand.name)} package · comparable weather window</p>
              <div class="mt-2 flex flex-wrap gap-1.5">
                <button type="button" class="rounded-full bg-ink px-3 py-1.5 text-[12px] font-medium text-paper transition hover:bg-ink-soft" data-conflict-date="${escapeHtml(altDates[0])}">${escapeHtml(altDates[0])}</button>
                <button type="button" class="rounded-full border border-border-default bg-paper px-3 py-1.5 text-[12px] text-ink transition hover:border-ink/30" data-conflict-date="${escapeHtml(altDates[1])}">${escapeHtml(altDates[1])}</button>
              </div>
              <div class="mt-3 flex items-end justify-between gap-2">
                <div>
                  <p class="text-[11px] text-ink-soft">All-in estimate</p>
                  <p class="font-title text-lg text-ink">${estSame}</p>
                </div>
                <button type="button" class="aiw-link-btn aiw-link-btn--sm" data-conflict-date="${escapeHtml(altDates[0])}">Select this date
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
              </div>
            </div>

            ${altSpace ? `
            <div class="overflow-hidden rounded-[var(--radius-lg)] bg-[#edece8]">
              <div class="px-4 pt-3">
                <span class="text-[11px] font-semibold uppercase tracking-wider text-copper">01</span>
              </div>
              <div class="flex flex-col gap-3 p-4 pt-2 sm:flex-row sm:items-stretch">
                <div class="flex min-w-0 flex-1 flex-col gap-3 sm:max-w-[200px]">
                  <div>
                    <h3 class="font-title text-[26px] leading-[1.05] text-ink">${escapeHtml(altSpace.name)}<span class="text-copper">.</span></h3>
                    <p class="mt-1 text-[11px] font-semibold uppercase tracking-wider text-ink-soft">Same property<br/>different space</p>
                    <div class="mt-2 h-px w-[18px] bg-[color:var(--color-sage-600)] opacity-70"></div>
                    <div class="mt-2 space-y-1 text-[12px] text-ink">
                      <p>Also at ${escapeHtml(hotel.name)}</p>
                      <p>${escapeHtml(altSpace.type)} · up to ${altSpace.capacity} guests</p>
                    </div>
                  </div>
                  <div>
                    <p class="text-[11px] text-ink-soft">All-in estimate</p>
                    <p class="font-title text-xl text-ink">${estAltSpace}</p>
                  </div>
                  <button type="button" class="aiw-link-btn w-fit" data-conflict-samespace="${altSpace.id}">Explore ${escapeHtml(altSpace.name.split(" ")[0] || altSpace.name)}
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                </div>
                <div class="relative min-h-[200px] flex-1 overflow-hidden rounded-[var(--radius-md)] sm:min-h-[220px]">
                  <img src="${hotelCardImageUrl(hotel.id)}" alt="" class="absolute inset-0 h-full w-full object-cover" loading="lazy" decoding="async" referrerpolicy="no-referrer-when-downgrade" />
                  <div class="pointer-events-none absolute inset-0 bg-gradient-to-t from-black/35 to-transparent"></div>
                  <span class="absolute right-3 top-3 rounded-full bg-paper/95 px-2.5 py-1 text-[10px] font-semibold uppercase tracking-wide text-ink shadow-sm">${escapeHtml(altSpaceBadge)}</span>
                </div>
              </div>
            </div>` : ""}

            ${nearbyHotel && nearbySpace ? `
            <div class="overflow-hidden rounded-[var(--radius-lg)] bg-[#edece8]">
              <div class="flex justify-end px-4 pt-3">
                <span class="text-[11px] font-semibold uppercase tracking-wider text-copper">02</span>
              </div>
              <div class="flex flex-col-reverse gap-3 p-4 pt-0 sm:flex-row sm:items-stretch">
                <div class="relative min-h-[200px] flex-1 overflow-hidden rounded-[var(--radius-md)] sm:min-h-[220px]">
                  <img src="${hotelCardImageUrl(nearbyHotel.id)}" alt="" class="absolute inset-0 h-full w-full object-cover" loading="lazy" decoding="async" referrerpolicy="no-referrer-when-downgrade" />
                  <span class="absolute left-3 top-3 rounded-full bg-paper/95 px-2.5 py-1 text-[10px] font-semibold uppercase tracking-wide text-ink shadow-sm">Fully available</span>
                </div>
                <div class="flex min-w-0 flex-1 flex-col items-end gap-3 text-right sm:max-w-[200px]">
                  <div class="w-full">
                    <h3 class="font-title text-[26px] leading-[1.05] text-ink">${escapeHtml(nearbyHotel.name)}<span class="text-copper">.</span></h3>
                    <p class="mt-1 text-[11px] font-semibold uppercase tracking-wider text-ink-soft">Similar vibe nearby</p>
                    <div class="mt-2 ml-auto h-px w-[18px] bg-copper opacity-40"></div>
                    <div class="mt-2 space-y-1 text-[12px] text-ink">
                      ${nearbyMeta.map(line => `<p>${escapeHtml(line)}</p>`).join("")}
                    </div>
                  </div>
                  <div>
                    <p class="text-[11px] text-ink-soft">All-in estimate</p>
                    <p class="font-title text-xl text-ink">${estNearby}</p>
                  </div>
                  <button type="button" class="aiw-link-btn justify-end" data-conflict-nearby="${nearbyHotel.id}|${nearbySpace.id}">Explore ${escapeHtml(nearbyHotel.name.split(" ")[0] || "resort")}
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                </div>
              </div>
            </div>` : ""}
          </div>

          <div class="mt-2 px-1 pb-4">
            <div class="flex items-center gap-3 rounded-[var(--radius-lg)] bg-[#ebeee7] px-3.5 py-3">
              <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-md bg-paper shadow-sm" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" class="text-ink-muted"><path d="M12 22s7-4 7-10a7 7 0 1 0-14 0c0 6 7 10 7 10Z" stroke="currentColor" stroke-width="1.3"/><path d="M12 6v4l2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              </div>
              <div class="min-w-0 flex-1">
                <p class="text-[12px] font-medium text-ink">Get notified if ${escapeHtml(s.name)} opens up</p>
                <p class="text-[11px] text-ink-soft">We'll alert you if a cancellation matches your dates</p>
              </div>
              <button type="button" class="shrink-0 rounded-full border border-border-default bg-paper px-3 py-1.5 text-[12px] text-ink transition hover:border-ink/25" data-conflict-notify>Notify me</button>
            </div>
          </div>

          <div class="mt-2 border-t border-border-default/60 px-1 pt-4">
            <button type="button" class="flex w-full items-center justify-center gap-2 rounded-full border border-border-default bg-paper py-2.5 text-[13px] text-ink-soft transition hover:bg-cream" id="date-conflict-chat">
              <span class="text-copper" aria-hidden="true">✦</span>
              Ask Allie about other options…
            </button>
          </div>
        </div>
      `);

      document.getElementById("date-conflict-back")?.addEventListener("click", () => {
        enterChapter(5);
        animateTimelineProgress();
        renderQuoteCanvas();
        void bot(`No problem — your quote is still here. Tweak dates or add-ons, then try the hold again.`);
      });

      document.querySelectorAll("[data-conflict-date]").forEach(btn => {
        btn.addEventListener("click", () => {
          const label = btn.getAttribute("data-conflict-date");
          if (!label) return;
          pkg.date = label;
          saveState({ ...pkg });
          refreshPackage();
          void bot(`Updated to <strong>${escapeHtml(label)}</strong> — run the $500 hold again when you're ready.`);
          renderSaveDateCanvas();
        });
      });

      document.querySelectorAll("[data-conflict-samespace]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-conflict-samespace");
          if (!id) return;
          pkg.spaceId = id;
          const sp = byId(SPACES, id);
          if (sp) pkg.hotelId = sp.hotelId;
          saveState({ ...pkg });
          refreshPackage();
          renderDateConflictCanvas();
          void bot(`Switched you to <strong>${escapeHtml(sp?.name || "that space")}</strong> — same property, refreshed estimate.`);
        });
      });

      document.querySelectorAll("[data-conflict-nearby]").forEach(btn => {
        btn.addEventListener("click", () => {
          const raw = btn.getAttribute("data-conflict-nearby") || "";
          const [hid, sid] = raw.split("|");
          if (!hid || !sid) return;
          pkg.hotelId = hid;
          pkg.spaceId = sid;
          saveState({ ...pkg });
          refreshPackage();
          renderDateConflictCanvas();
          const nh = byId(HOTELS, hid);
          void bot(`Re-centered on <strong>${escapeHtml(nh?.name || "that resort")}</strong> — review the banner and dates, then try your hold again.`);
        });
      });

      document.querySelector("[data-conflict-notify]")?.addEventListener("click", ev => {
        const t = ev.currentTarget;
        t.textContent = "Saved";
        t.disabled = true;
        t.classList.add("text-[color:var(--color-sage-600)]");
      });

      document.getElementById("date-conflict-chat")?.addEventListener("click", () => {
        document.getElementById("text-input")?.focus();
      });

      renderTimelineCanvas();
    }

    /* ============ HOLD CONFIRMATION (a11y fallback for the swipe-to-lock CTA) ============ */
    async function confirmDeposit() {
      const s = pkg.spaceId ? byId(SPACES, pkg.spaceId) : null;
      const hotel = s ? byId(HOTELS, s.hotelId) : null;
      if (!s || !hotel) {
        holdCountdownCleanup?.();
        holdCountdownCleanup = null;
        console.warn("plan: confirmDeposit without valid space/hotel");
        return;
      }

      if (pkg.deposited) {
        holdCountdownCleanup?.();
        holdCountdownCleanup = null;
        mountHoldSuccessCanvas(s, hotel);
        return;
      }

      if (shouldSimulateDateConflict()) {
        holdCountdownCleanup?.();
        holdCountdownCleanup = null;
        await bot(`That weekend just got a simultaneous hold — <strong>${escapeHtml(pkg.date || "your dates")}</strong> is no longer open at ${escapeHtml(s.name)}. Here are the clean pivots that keep your package math honest.`);
        renderDateConflictCanvas();
        return;
      }

      const track = document.getElementById("hold-swipe-track");
      burstConfetti(track || canvasEl);
      await new Promise(r => setTimeout(r, 400));
      await finishHoldCelebration(s, hotel);
    }

    /* ============ RESET ============ */
    const restartFlow = () => {
      clearState();
      start().catch(e => console.error("plan: restart failed", e));
    };
    const resetBtn = document.getElementById("reset-btn");
    if (resetBtn) resetBtn.addEventListener("click", restartFlow);

    /* ============ KICKOFF ============ */
    const restored = loadState();
    const storySlug = new URLSearchParams(window.location.search).get("story");
    if (storySlug) {
      startFromHomeStorySlug(storySlug.trim()).catch(e => console.error("plan: story deep-link failed", e));
    } else if (restored?.state?.spaceId) {
      try {
        Object.assign(pkg, restored.state, { heldUntil: restored.expiresAt });
        bubble("bot", `Welcome back — it's Allie. I held your configuration for the past ${Math.round((Date.now()-restored.savedAt)/60000)} minutes. Let's pick up exactly here.`);
        refreshPackage();
        const s = byId(SPACES, pkg.spaceId);
        const hotel = s ? byId(HOTELS, s.hotelId) : null;
        if (!s || !hotel) {
          clearState();
          start().catch(e => console.error(e));
        } else if (pkg.deposited) {
          enterChapter(6);
          renderTimelineCanvas();
          void confirmDeposit();
        } else if (pkg.bookContract?.signed) {
          enterChapter(6);
          renderTimelineCanvas();
          renderSaveDateCanvas();
        } else {
          enterChapter(5);
          renderTimelineCanvas();
          renderQuoteCanvas();
        }
      } catch (e) {
        console.error("plan: restore failed", e);
        clearState();
        start().catch(err => console.error(err));
      }
    } else {
      start().catch(e => console.error("plan: start failed", e));
    }

    if (typeof window !== "undefined" && window.location?.protocol === "file:") {
      console.warn(
        "All In Weddings planner: open plan.html through a local web server (not file://) so ES module imports load. Example: python3 -m http.server 8080"
      );
    }
  </script>
