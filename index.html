<!doctype html>

    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #fcf9f8;
        color: #2a2a28;
        display: grid;
        place-items: center;
        text-align: center;
      }
      main { max-width: 28rem; padding: 2rem; }
      h1 {
        font-family: "Playfair Display", "Cormorant Garamond", Georgia, serif;
        font-size: clamp(2rem, 6vw, 2.75rem);
        letter-spacing: -0.02em;

      p { color: #5a5651; margin: 0.5rem 0 1.5rem; line-height: 1.55; }
      a {
        display: inline-block;
        padding: 0.85rem 1.5rem;
        border-radius: 9999px;
        background: #2a2a28;
        color: #fcf9f8;
        text-decoration: none;
        font-weight: 600;
        letter-spacing: 0.02em;
        transition: background-color 200ms ease;
      }
      a:hover { background: #4a4842; }
      .meta {
        margin-top: 1.5rem;
        font-size: 0.78rem;
        color: #8b857d;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .links { margin-top: 1rem; font-size: 0.85rem; }
      .links a {
        background: transparent;
        color: #9a6e40;
        border: 1px solid rgba(154, 110, 64, 0.45);
        padding: 0.5rem 1rem;
        margin: 0 0.25rem;
        font-weight: 500;
      }
      .links a:hover { background: rgba(154, 110, 64, 0.08); }
    </style>
